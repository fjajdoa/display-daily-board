<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>显示行业每日资讯 · 2026年07月10日</title>
<style>
  :root { --bg:#0f1419; --card:#1a2230; --line:#26303f; --fg:#e6edf3; --muted:#8b98a9;
           --accent:#3b82f6; --good:#16a34a; --cost:#ea580c; --demand:#dc2626; --risk:#9333ea; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
          font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; line-height:1.5; }
  .wrap { max-width:860px; margin:0 auto; padding:18px 16px 60px; }
  header h1 { font-size:20px; margin:0 0 4px; }
  header .sub { color:var(--muted); font-size:13px; }
  .filters { position:sticky; top:0; background:var(--bg); padding:12px 0; z-index:5;
              display:flex; flex-wrap:wrap; gap:8px; border-bottom:1px solid var(--line); }
  .f { background:var(--card); color:var(--muted); border:1px solid var(--line);
        border-radius:16px; padding:5px 12px; font-size:13px; cursor:pointer; }
  .f.active { color:#fff; background:var(--accent); border-color:var(--accent); }
  .block { margin-top:22px; }
  .block h2 { font-size:16px; margin:0 0 10px; padding-bottom:6px; border-bottom:1px solid var(--line); }
  .count { font-size:12px; color:var(--muted); font-weight:normal; }
  .cards { display:flex; flex-direction:column; gap:10px; }
  .card { display:block; background:var(--card); border:1px solid var(--line); border-radius:10px;
           padding:12px 14px; text-decoration:none; color:var(--fg); transition:border-color .15s; }
  .card:hover { border-color:var(--accent); }
  .card-title { font-size:15px; font-weight:600; }
  .card-meta { margin-top:7px; display:flex; flex-wrap:wrap; gap:6px; align-items:center; font-size:12px; }
  .date { color:var(--muted); }
  .src { color:var(--accent); }
  .comp { background:#1e293b; color:#93c5fd; border:1px solid #2c4a73; border-radius:4px; padding:1px 6px; }
  .tag { border-radius:4px; padding:1px 6px; color:#fff; }
  .t-cost { background:var(--cost); } .t-demand { background:var(--demand); }
  .t-risk { background:var(--risk); } .t-good { background:var(--good); }
  .empty { color:var(--muted); text-align:center; margin-top:40px; }
  footer { margin-top:40px; color:var(--muted); font-size:12px; text-align:center; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>📡 显示行业每日资讯</h1>
    <div class="sub">2026年07月10日 · 共 0 条 · 生成于 2026-07-10 08:21<br>采集情况 — 迪显:10, 群智:10, CINNO:10, 洛图:10, Omdia:10</div>
  </header>
  <div class="filters"><button class="f active" data-f="all">全部</button></div>
  <p class="empty">今日窗口内暂无新增资讯。</p>
  <footer>聚焦 TV / 显示器 / 电子纸产业链 · 竞品动态与行业大事件优先 · 仅近 2 天 · 已跨天去重</footer>
</div>
<script>
  const btns=document.querySelectorAll('.f'), blocks=document.querySelectorAll('.block');
  btns.forEach(b=>b.onclick=()=>{
    btns.forEach(x=>x.classList.remove('active')); b.classList.add('active');
    const f=b.dataset.f;
    blocks.forEach(bl=>bl.style.display=(f==='all'||bl.dataset.section===f)?'':'none');
  });
</script>
</body>
</html>
